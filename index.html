<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vakit Ölçer | Akıllı Sesli Kronometre</title>
    <meta name="description" content="Öğrenciler için tasarlanmış, Türkçe sesli komutlarla çalışan modern ve şık kronometre uygulaması.">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="container">
        <div class="card" id="appCard">
            <h1>Vakit Ölçer</h1>
            <p class="subtitle">Zaman Yönetimi & Odaklanma</p>

            <div class="timer-container">
                <div class="timer" id="display">
                    <span id="minutes">00</span>:<span id="seconds">00</span><span class="ms">.<span id="milliseconds">00</span></span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="resetBtn" title="Sıfırla">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
                
                <button class="btn btn-primary" id="startStopBtn">
                    <span id="btnIcon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </span>
                    <span id="btnText">Başlat</span>
                </button>
            </div>

            <div class="voice-status" id="voiceToggle" title="Sesli Komutu Aç/Kapat">
                <div class="mic-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </div>
                <span class="status-text" id="voiceStatus">Sesli Kontrol: Kapalı</span>
            </div>

            <div class="info">
                <p>Sesli komutları kullanmak için mikrofona dokunun.</p>
                <p>Komutlar: <span class="command">"Başla"</span>, <span class="command">"Dur"</span>, <span class="command">"Sıfırla"</span></p>
                <p id="debugTranscript" style="color: rgba(255, 255, 255, 0.5); font-style: italic; font-size: 0.85rem; margin-top: 10px; min-height: 20px;"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Kayıtlı:', reg))
                    .catch(err => console.log('SW Hatası:', err));
            });
        }
    </script>
</body>
</html>
